<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome | Hotel Depari</title>
  <style>
    /* 1. Reset & Global Theme */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background-color: #000000; /* Black background for luxury feel */
        color: white;
        font-family: 'Segoe UI', Roboto, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
    }

    /* 2. Hero Header Section */
    .hero {
        width: 100%;
        height: 45vh;
        background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.8)), 
                    url('dish1.jpg'); /* You can change this to a hotel lobby image */
        background-size: cover;
        background-position: center;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        border-bottom: 3px solid #D4AF37; /* Gold accent */
    }

    .hero h1 {
        font-size: 32px;
        letter-spacing: 5px;
        text-transform: uppercase;
        margin-bottom: 10px;
        color: #D4AF37;
    }

    .hero p {
        font-size: 14px;
        letter-spacing: 2px;
        opacity: 0.9;
    }

    /* 3. Welcome Content */
    .welcome-container {
        padding: 30px 20px;
        text-align: center;
    }

    .welcome-container h2 {
        font-size: 20px;
        margin-bottom: 15px;
        font-weight: 300;
    }

    /* 4. Navigation Grid (Quick Menu) */
    .nav-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        width: 90%;
        max-width: 400px;
        margin-top: 10px;
    }

    .nav-card {
        background: #1A1A1A;
        border: 1px solid #333;
        padding: 20px;
        border-radius: 15px;
        text-decoration: none;
        color: white;
        text-align: center;
        transition: 0.3s;
    }

    .nav-card:active {
        transform: scale(0.95);
        background: #D4AF37;
        color: black;
    }

    .nav-card i {
        display: block;
        font-size: 24px;
        margin-bottom: 10px;
        color: #D4AF37;
    }

    .nav-card span {
        font-size: 13px;
        font-weight: bold;
        text-transform: uppercase;
    }

    /* 5. Footer Info */
    footer {
        margin-top: auto;
        padding: 30px;
        font-size: 12px;
        color: #666;
        text-align: center;
    }

  </style>
</head>
<body>

  <div class="hero">
    <h1>DEPARI</h1>
    <p>LUXURY & COMFORT</p>
  </div>

  <div class="welcome-container">
    <h2>Welcome to your stay</h2>
    <p style="font-size: 13px; color: #BBB; line-height: 1.5;">
        Experience world-class hospitality in the heart of the city. 
        Everything you need is just a tap away.
    </p>
  </div>

  <div class="nav-grid">
    <a href="rooms.html" class="nav-card">
        <span>Rooms</span>
    </a>
    <a href="food.html" class="nav-card">
        <span>Restaurant</span>
    </a>
    <a href="service.html" class="nav-card">
        <span>Services</span>
    </a>
    <a href="info.html" class="nav-card">
        <span>Contact</span>
    </a>
  </div>

  <footer>
    <p>&copy; 2026 Hotel Depari. All rights reserved.</p>
  </footer>

</body>
</html>
