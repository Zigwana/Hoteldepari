<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Food | Depari Restaurant</title>
    <style>
        body { background: #FFF9F0; color: #333; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; }
        h2 { text-align: center; border-bottom: 3px solid #D4AF37; padding-bottom: 10px; margin-bottom: 25px; }
        form { display: flex; flex-direction: column; gap: 15px; }
        input, textarea { padding: 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        textarea { resize: none; }
        .btn-order { background: #000; color: #fff; padding: 18px; border: none; border-radius: 8px; font-weight: bold; text-transform: uppercase; }
        .btn-order:active { background: #D4AF37; color: #000; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Restaurant Order</h2>
        <form action="https://formspree.io/f/xnjoorek" method="POST">
            <input type="text" name="customer" placeholder="Name or Room Number" required>
            
            <textarea name="food_items" rows="5" placeholder="List your order (e.g. 2 Hamburgers, 1 Stone Pizza, 1 Soda)" required></textarea>
            
            <input type="text" name="notes" placeholder="Special requests (e.g. No onions)">
            
            <button type="submit" class="btn-order">Send to Kitchen</button>
        </form>
    </div>
</body>
</html>
